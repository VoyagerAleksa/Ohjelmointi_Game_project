<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <title>Map</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <link rel="stylesheet" href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" />
    <link rel="stylesheet" href="map_style.css"/>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="https://unpkg.com/leaflet-rotatedmarker/leaflet.rotatedMarker.js"></script>
    <script src="https://cdn.maptiler.com/maptiler-sdk-js/v4.0.1/maptiler-sdk.umd.min.js"></script>
    <link href="https://cdn.maptiler.com/maptiler-sdk-js/v4.0.1/maptiler-sdk.css" rel="stylesheet" />
    <script src="https://cdn.maptiler.com/leaflet-maptilersdk/v4.1.0/leaflet-maptilersdk.umd.min.js"></script>
</head>
<body>
    <div id="map"></div>

    <div id="data" class="flight-panel">
        <div class="flight-card">
            <div class="flight-label">Aircraft</div>
            <div id="aircraft-type" class="flight-value">—</div>
            <div id="aircraft-name" class="flight-subvalue">Waiting for flight data</div>
        </div>

        <div class="flight-card">
            <div class="flight-label">Current flight distance</div>
            <div id="flight-distance" class="flight-value">0 km</div>
            <div class="flight-subvalue">Distance between airports</div>
        </div>

        <div class="flight-card">
            <div class="flight-label">Flight CO2</div>
            <div id="flight-co2" class="flight-value">0.00 kg</div>
            <div class="flight-subvalue">Current flight emissions</div>
        </div>

        <div class="flight-card">
            <div class="flight-label">Session CO2</div>
            <div id="session-co2" class="flight-value">0.00 kg</div>
            <div class="flight-subvalue">Total session emissions</div>
        </div>
    </div>

    <script src="weather.js"></script>
    <script src="map.js"></script>
    <script src="victory.js"></script>
    <script src="assistant.js"></script>
    <script src="game_panel.js"></script>
</body>
</html>
